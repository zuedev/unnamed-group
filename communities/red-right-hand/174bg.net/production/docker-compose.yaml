services:
  174bg-net:
    build: https://github.com/zuedev/unnamed-group.git#master:communities/red-right-hand/174bg.net
    restart: unless-stopped
    ports:
      - "3000:3000/tcp"
      - "3000:3000/udp"
    env_file: .env

  postgres:
    image: postgres:18
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql
    restart: unless-stopped
